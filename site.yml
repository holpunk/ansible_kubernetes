---
- name: Kubernetes Cluster Setup — Argo CD
  hosts: localhost
  gather_facts: true

  pre_tasks:
    - name: Banner
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║  Local Kubernetes Cluster Setup with Ansible             ║"
          - "║  Kind + Argo CD                                          ║"
          - "╚══════════════════════════════════════════════════════════╝"

  roles:
    - role: prereqs
      tags: [prereqs]

    - role: kind_cluster
      tags: [cluster]

    - role: argocd
      tags: [argocd]

  post_tasks:
    - name: Final summary
      debug:
        msg:
          - "🎉 Setup complete! Your local Kubernetes stack is ready."
          - ""
          - "  Argo CD    → http://localhost:8080   (after port-forwarding)"
          - ""
          - "  To access Argo CD, run:"
          - "  kubectl port-forward svc/argocd-server -n argocd 8080:80"
          - ""
          - "  ── Run individual roles with tags ────────────────────────────"
          - "  ansible-playbook site.yml --tags argocd"
