---
- name: Update apt cache
  become: true
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install basic dependencies
  become: true
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - software-properties-common
    state: present

# ── Docker Checks & Installation ──────────────────────────────────
- name: Check if Docker is installed
  command: which docker
  register: docker_check
  failed_when: false
  changed_when: false

- name: Install Docker Engine
  block:
    - name: Add Docker's official GPG key
      become: true
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      become: true
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      become: true
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io]
        state: present

    - name: Ensure docker group exists
      become: true
      group:
        name: docker
        state: present

    - name: Add user to docker group
      become: true
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes
  when: docker_check.rc != 0

- name: Ensure Docker service is started
  become: true
  service:
    name: docker
    state: started
    enabled: yes

# ── Kubectl Checks & Installation ────────────────────────────────
- name: Check if Kubectl is installed
  command: which kubectl
  register: kubectl_check
  failed_when: false
  changed_when: false

- name: Install Kubectl
  block:
    - name: Ensure keyrings directory exists
      become: true
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Kubectl GPG key
      become: true
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: '0644'
        force: true

    - name: Add Kubectl repository
      become: true
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /"
        state: present
        filename: kubernetes

    - name: Install Kubectl package
      become: true
      apt:
        name: kubectl
        state: present
  when: kubectl_check.rc != 0

# ── Helm Checks & Installation ──────────────────────────────────
- name: Check if Helm is installed
  command: which helm
  register: helm_check
  failed_when: false
  changed_when: false

- name: Install Helm
  block:
    - name: Add Helm GPG key
      become: true
      apt_key:
        url: https://baltocdn.com/helm/signing.asc
        state: present

    - name: Add Helm repository
      become: true
      apt_repository:
        repo: "deb https://baltocdn.com/helm/stable/debian/ all main"
        state: present

    - name: Install Helm package
      become: true
      apt:
        name: helm
        state: present
  when: helm_check.rc != 0

# ── Kind Checks & Installation ──────────────────────────────────
- name: Check if Kind is installed
  command: which kind
  register: kind_check
  failed_when: false
  changed_when: false

- name: Install Kind binary
  become: true
  get_url:
    url: https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64
    dest: /usr/local/bin/kind
    mode: '0755'
  when: kind_check.rc != 0

- name: Wait for Docker daemon to become available
  command: docker info
  register: docker_info
  until: docker_info.rc == 0
  retries: 20
  delay: 5
  changed_when: false
