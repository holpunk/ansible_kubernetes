---
- name: Check if Argo CD Helm repo is already added
  command: helm repo list
  register: helm_repos
  changed_when: false
  failed_when: false

- name: Add Argo CD Helm repository
  command: helm repo add argo https://argoproj.github.io/argo-helm
  when: "'https://argoproj.github.io/argo-helm' not in helm_repos.stdout"

- name: Update Helm repositories
  command: helm repo update
  when: "'https://argoproj.github.io/argo-helm' not in helm_repos.stdout"
  changed_when: false

- name: Check if Argo CD namespace exists
  command: kubectl get namespace {{ argocd_namespace }}
  register: argocd_ns_check
  failed_when: false
  changed_when: false

- name: Create Argo CD namespace
  command: kubectl create namespace {{ argocd_namespace }}
  when: argocd_ns_check.rc != 0

- name: Install / upgrade Argo CD via Helm
  command: >
    helm upgrade --install argocd argo/argo-cd
    --namespace {{ argocd_namespace }}
    --version {{ argocd_chart_version }}
    --set server.service.type=ClusterIP
    --set dex.enabled=false
    --set configs.params."server.insecure"=true
    --wait
    --timeout 10m

- name: Wait for Argo CD server deployment to be available
  command: >  
    kubectl rollout status deployment/argocd-server
    -n {{ argocd_namespace }}
    --timeout=300s
  changed_when: false

- name: Wait for Argo CD repo-server deployment to be available
  command: >
    kubectl rollout status deployment/argocd-repo-server
    -n {{ argocd_namespace }}
    --timeout=300s
  changed_when: false

- name: Wait for Argo CD application-controller statefulset
  command: >
    kubectl rollout status statefulset/argocd-application-controller
    -n {{ argocd_namespace }}
    --timeout=300s
  changed_when: false

- name: Fetch Argo CD initial admin password
  command: >
    kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret
    -o jsonpath="{.data.password}"
  register: argocd_password_b64
  changed_when: false

- name: Decode Argo CD admin password
  set_fact:
    argocd_admin_password: "{{ argocd_password_b64.stdout | b64decode }}"

- name: Display Argo CD access info
  debug:
    msg:
      - "✅ Argo CD is ready!"
      - "   Run in a separate terminal:"
      - "   kubectl port-forward svc/argocd-server -n {{ argocd_namespace }} 8080:80"
      - "   URL:      http://localhost:8080  (plain HTTP, no cert warning)"
      - "   Username: admin"
      - "   Password: {{ argocd_admin_password }}"
