---
# ── Kind cluster ──────────────────────────────────────────────
kind_cluster_name: "local-k8s"
kind_k8s_image: "kindest/node:v1.29.2"

# ── Argo CD ───────────────────────────────────────────────────
argocd_namespace: "argocd"
argocd_chart_version: "7.1.3"      # argo-helm/argo-cd

# ── Kubeconfig ────────────────────────────────────────────────
kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/config"
